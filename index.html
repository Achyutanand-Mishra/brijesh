<body style="background-image: url(logo.jpg); background-size:cover;">
  <div class="hero">
    <div class="conent">
      <h1 class="heading1">BRIJESH SINGH ™</h1>
      <div style="display:grid; place-content: center; place-items: center;">
        <img src="logo.jpg" alt="Cricket Logo" style="border-radius: 50%; width: 80px; border: 2px solid white;">
      </div>
    </div>

    <div class="content-wrapper" onclick="goto()">
      <span id="countdown">60</span>
      <div class="points">
        <ul>
          <li><i class="fa fa-check-circle" aria-hidden="true"></i>Daily Cricket Match Updates 🏏</li>
          <li><i class="fa fa-check-circle" aria-hidden="true"></i>Team Analysis & Insights 🏏</li>
          <li><i class="fa fa-check-circle" aria-hidden="true"></i>Player Performance Breakdown 🏏</li>
        </ul>
      </div>
    </div>

    <div class="button2">
      <a href="https://t.me/+eOUlaLZGcglmZDY1" class="button">
        Join Telegram Channel <i class="fa fa-telegram" aria-hidden="true"></i>
      </a>
    </div>

    <div style="color: aliceblue;" class="count">Stay Updated - Cricket Insights! <span id="countdown2">60 seconds</span></div>
    <h4>Join our community for latest cricket updates</h4>
  </div>

  <script>
    let remainingSeconds = 60;
    let remainingSeconds2 = 60;

    function updateCountdown() {
      document.getElementById("countdown").innerText = remainingSeconds;
      document.getElementById("countdown2").innerText = `${remainingSeconds2} seconds`;

      remainingSeconds--;
      remainingSeconds2--;

      if (remainingSeconds < 0) remainingSeconds = 60;
      if (remainingSeconds2 < 0) remainingSeconds2 = 60;
    }

    setInterval(updateCountdown, 1000);

    function goto() {
      window.location.href = "https://t.me/+eOUlaLZGcglmZDY1";
    }
  </script>
